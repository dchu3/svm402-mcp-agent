services:
  caddy:
    image: caddy:2.7.6-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - analysis-server

  api-service:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MCP_DEXSCREENER_CMD: node /opt/mcp/dex-screener-mcp/dist/index.js
      MCP_DEXPAPRIKA_CMD: dexpaprika-mcp
      MCP_RUGCHECK_CMD: node /opt/mcp/dex-rugcheck-mcp/dist/index.js
      MCP_SOLANA_RPC_CMD: node /opt/mcp/solana-rpc-mcp/dist/index.js
    command: ["--http-api"]
    # Not exposing ports externally; Caddy proxies to the analysis-server,
    # which then calls this API internally.

  analysis-server:
    build:
      context: ./server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHON_API_URL: http://api-service:8080
      SERVER_PORT: 4022
    depends_on:
      - api-service
    # Exposing only internally to the Docker network.
    # Caddy will reverse-proxy requests here.

volumes:
  caddy_data:
  caddy_config:
