# Production deployment for the paid analysis MCP server.
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Requires:
#   - .env file with all required variables (see .env.production.example)
#   - DOMAIN env var set to your public domain (e.g. api.example.com)

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN environment variable is required}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      analysis-server:
        condition: service_healthy
    networks:
      - dex-net
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5

  api-service:
    build: .
    command: ["--http-api"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MCP_DEXSCREENER_CMD: node /opt/mcp/dex-screener-mcp/dist/index.js
      MCP_DEXPAPRIKA_CMD: dexpaprika-mcp
      MCP_RUGCHECK_CMD: node /opt/mcp/dex-rugcheck-mcp/dist/index.js
      MCP_SOLANA_RPC_CMD: node /opt/mcp/solana-rpc-mcp/dist/index.js
    volumes:
      - dex-bot-data:/home/botuser/.dex-bot
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dex-net
    security_opt:
      - no-new-privileges:true
    mem_limit: 2g
    cpus: 2

  analysis-server:
    build:
      context: ./server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHON_API_URL: http://api-service:8080
    expose:
      - "4022"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4022/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      api-service:
        condition: service_healthy
    networks:
      - dex-net
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    cpus: 1

volumes:
  dex-bot-data:
  caddy-data:
  caddy-config:

networks:
  dex-net:
    name: dex-net
