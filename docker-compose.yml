services:
  bot:
    build: .
    env_file:
      - .env
    environment:
      MCP_DEXSCREENER_CMD: node /opt/mcp/dex-screener-mcp/dist/index.js
      MCP_DEXPAPRIKA_CMD: dexpaprika-mcp
      MCP_RUGCHECK_CMD: node /opt/mcp/dex-rugcheck-mcp/dist/index.js
      MCP_SOLANA_RPC_CMD: node /opt/mcp/solana-rpc-mcp/dist/index.js
    # Enable interactive mode (stdin + tty)
    stdin_open: true
    tty: true
    command: ["--interactive"]

  api-service:
    build: .
    env_file:
      - .env
    environment:
      MCP_DEXSCREENER_CMD: node /opt/mcp/dex-screener-mcp/dist/index.js
      MCP_DEXPAPRIKA_CMD: dexpaprika-mcp
      MCP_RUGCHECK_CMD: node /opt/mcp/dex-rugcheck-mcp/dist/index.js
      MCP_SOLANA_RPC_CMD: node /opt/mcp/solana-rpc-mcp/dist/index.js
    ports:
      - "8080:8080"
    command: ["--http-api"]

  # Express payment gateway
  analysis-server:
    build:
      context: ./server
    env_file:
      - .env
    environment:
      # Explicitly set internal API URL so it resolves over Docker network
      PYTHON_API_URL: http://api-service:8080
    ports:
      - "4022:4022"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:4022/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      - api-service
